<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Engagement Inquiry | Dipak Acharya</title>
    <style>
        :root {
            --primary-bg: #0f1113;
            --card-bg: #1a1d21;
            --accent-gold: #c5a059;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --input-bg: #25282c;
            --border: #33363a;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }

        .form-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 50px;
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }

        .form-header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--accent-gold);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--white);
            margin: 0 0 10px 0;
        }

        .meta-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .section-title {
            font-size: 1.1rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 30px 0 20px 0;
            display: flex;
            align-items: center;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
            margin-left: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: 600;
        }

        input, select, textarea {
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 12px;
            color: var(--text-main);
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: 4px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .checkbox-item input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            accent-color: var(--accent-gold);
        }

        .submit-btn {
            width: 100%;
            background: var(--accent-gold);
            color: #000;
            border: none;
            padding: 18px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.3s;
            border-radius: 4px;
        }

        .submit-btn:hover {
            background: #e2b96d;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .form-container { padding: 25px; }
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <h1>Strategic Engagement Inquiry</h1>
        <div class="meta-info">
            To: Dipak Acharya | CEO & Hospitality Executive<br>
            Purpose: Initial Consultation Request
        </div>
    </div>

    <form action="#" method="POST">
        <div class="section-title">1. Contact Details</div>
        <div class="grid">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="title">Title / Position</label>
                <input type="text" id="title" name="title" required>
            </div>
            <div class="form-group">
                <label for="org">Organization</label>
                <input type="text" id="org" name="org" required>
            </div>
            <div class="form-group">
                <label for="website">Website</label>
                <input type="url" id="website" name="website" placeholder="https://">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone (WhatsApp)</label>
                <input type="tel" id="phone" name="phone">
            </div>
        </div>

        <div class="form-group full-width">
            <label>Preferred Contact Method</label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" name="method" value="Email"> Email</label>
                <label class="checkbox-item"><input type="checkbox" name="method" value="Phone"> Phone</label>
                <label class="checkbox-item"><input type="checkbox" name="method" value="WhatsApp"> WhatsApp</label>
                <label class="checkbox-item"><input type="checkbox" name="method" value="VideoCall"> Video Call</label>
            </div>
        </div>

        <div class="section-title">2. Organization Overview</div>
        <label>Type of Business</label>
        <div class="checkbox-group" style="margin-bottom: 20px;">
            <label class="checkbox-item"><input type="checkbox" name="type" value="Hotel Independent"> Hotel (Independent)</label>
            <label class="checkbox-item"><input type="checkbox" name="type" value="Hotel Group"> Hotel Group / Chain</label>
            <label class="checkbox-item"><input type="checkbox" name="type" value="Restaurant"> Restaurant / F&B Group</label>
            <label class="checkbox-item"><input type="checkbox" name="type" value="Resort"> Resort / Destination Property</label>
            <label class="checkbox-item"><input type="checkbox" name="type" value="Motel"> Motel / Highway Hospitality</label>
            <label class="checkbox-item"><input type="checkbox" name="type" value="Tourism"> Tourism / Travel Company</label>
            <label class="checkbox-item"><input type="checkbox" name="type" value="Real Estate"> Real Estate / Development</label>
            <label class="checkbox-item"><input type="checkbox" name="type" value="Government"> Government / Tourism Board</label>
            <label class="checkbox-item"><input type="checkbox" name="type" value="Investor"> Investor / Investment Fund</label>
            <div class="checkbox-item" style="grid-column: span 2;">
                <input type="checkbox" name="type" value="Other"> 
                <input type="text" placeholder="Other: Please specify..." style="flex:1; border-top:none; border-left:none; border-right:none; background:transparent; padding:2px 5px;">
            </div>
        </div>

        <div class="grid">
            <div class="form-group">
                <label for="props">Number of Properties</label>
                <input type="number" id="props" name="props">
            </div>
            <div class="form-group">
                <label for="employees">Number of Employees</label>
                <input type="number" id="employees" name="employees">
            </div>
            <div class="form-group full-width">
                <label for="revenue">Annual Revenue Range</label>
                <select id="revenue" name="revenue">
                    <option value="">Select range...</option>
                    <option value="below1m">Below $1M</option>
                    <option value="1m-5m">$1M - $5M</option>
                    <option value="5m-20m">$5M - $20M</option>
                    <option value="20m-50m">$20M - $50M</option>
                    <option value="above50m">Above $50M</option>
                </select>
            </div>
        </div>

        <button type="submit" class="submit-btn">Request Consultation</button>
    </form>
</div>

</body>
</html>
